<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up - HalalMatch.com</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { translatePage, initLanguageSelector } from "./translations.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCSdpzhy_WVaLLAyFYjHpglChbjoY-hUGM",
      authDomain: "halalmatchcom786.firebaseapp.com",
      projectId: "halalmatchcom786",
      storageBucket: "halalmatchcom786.firebasestorage.app",
      messagingSenderId: "781367758589",
      appId: "1:781367758589:web:da4377d96fc07af0933894",
      measurementId: "G-1HBFGDECRF"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Make auth globally available
    window.auth = auth;
    window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
    window.sendEmailVerification = sendEmailVerification;
    window.updateProfile = updateProfile;

    // Initialize language selector and translate page
    window.addEventListener('DOMContentLoaded', () => {
      initLanguageSelector();
      translatePage();
    });
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    html {
      background: rgba(10,12,16,0.92) url('https://i.postimg.cc/3wX6rjvQ/Untitled-design2.png') center/cover fixed no-repeat;
      backdrop-filter: blur(1px);
      min-height: 100vh;
    }
    body {
      font-family: 'Inter', sans-serif;
      position: relative;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: #1f2937;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 10px,
          rgba(255, 255, 255, 0.03) 10px,
          rgba(255, 255, 255, 0.03) 20px
        ),
        radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.05) 0%, transparent 25%),
        radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.05) 0%, transparent 25%);
      pointer-events: none;
      z-index: -1;
    }
    .bg-scrim {
      background: rgba(10,12,16,0.92);
      backdrop-filter: blur(1px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .btn-3d {
      transform: translateY(0);
      transition: transform 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
      text-shadow: 0 1px 2px rgba(255,255,255,0.5);
    }
    .btn-3d:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(0,0,0,0.45);
    }
    .card {
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .glossy-text {
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .form-input {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      padding: 12px;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    .user-type-btn {
      background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
      color: #1a1a1a;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      border: 2px solid #D4AF37;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(212, 175, 55, 0.3);
    }
    .user-type-btn:hover {
      background: linear-gradient(135deg, #B8860B 0%, #D4AF37 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(212, 175, 55, 0.4);
    }
    .validation-error {
      color: #dc2626;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body class="font-sans min-h-screen text-white">
  <header class="bg-scrim text-white p-4 shadow-lg">
    <nav class="flex justify-between items-center">
      <h1 class="text-2xl font-bold glossy-text">HalalMatch.com</h1>
      <a href="index.html" class="btn-3d bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition duration-300">Home</a>
    </nav>
  </header>

  <main class="p-4 md:p-6">
    <div class="max-w-4xl mx-auto">
      <div class="premium-card">
        <h2 class="text-2xl font-bold mb-4">Sign Up</h2>
        <p class="mb-4 text-lg">Create your account to start your journey towards finding your perfect match.</p>
        <form id="signupForm" class="text-left">
          <div class="mb-4">
            <label for="signupName" class="block mb-1 font-semibold">Name *</label>
            <input type="text" id="signupName" name="signupName" required class="form-input text-black w-full" />
          </div>
          <div class="mb-4">
            <label for="signupUsername" class="block mb-1 font-semibold">Username *</label>
            <input type="text" id="signupUsername" name="signupUsername" required class="form-input text-black w-full" />
          </div>
          <div class="mb-4">
            <label for="signupEmail" class="block mb-1 font-semibold">Gmail ID *</label>
            <input type="email" id="signupEmail" name="signupEmail" required class="form-input text-black w-full" />
          </div>
          <div class="mb-4">
            <label for="signupPassword" class="block mb-1 font-semibold">Password *</label>
            <input type="password" id="signupPassword" name="signupPassword" required class="form-input text-black w-full" />
          </div>
          <div class="mb-4">
            <label for="signupConfirmPassword" class="block mb-1 font-semibold">Confirm Password *</label>
            <input type="password" id="signupConfirmPassword" name="signupConfirmPassword" required class="form-input text-black w-full" />
          </div>
          <div id="signupError" class="validation-error hidden"></div>
          <div id="signupSuccess" class="text-green-500 font-semibold mb-4 hidden"></div>
          <button type="submit" class="user-type-btn w-full">Create Account</button>
        </form>
      </div>

      <!-- Verification Modal -->
      <div id="verificationModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg max-w-md w-full mx-4">
          <h2 class="text-2xl font-bold mb-4 text-center">Verify Your Email</h2>
          <p class="mb-4 text-center">A verification email has been sent to your Gmail account. Please check your inbox and click the verification link to activate your account.</p>
          <button id="checkVerificationBtn" class="user-type-btn w-full mb-2">I've Verified - Continue to Dashboard</button>
          <button id="closeVerificationBtn" class="user-type-btn w-full bg-gray-500 hover:bg-gray-600">Close</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Signup form submission handler
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearSignupMessages();

      const name = document.getElementById('signupName').value.trim();
      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;

      if (!name || !username || !email || !password || !confirmPassword) {
        showSignupError('Please fill in all required fields.');
        return;
      }

      if (password !== confirmPassword) {
        showSignupError('Passwords do not match.');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Update display name to username
        await updateProfile(user, { displayName: username });

        // Send email verification
        await sendEmailVerification(user);

        // Show verification modal
        document.getElementById('verificationModal').classList.remove('hidden');
        document.getElementById('signupForm').reset();
      } catch (error) {
        showSignupError(error.message);
      }
    });

    function clearSignupMessages() {
      document.getElementById('signupError').classList.add('hidden');
      document.getElementById('signupSuccess').classList.add('hidden');
      document.getElementById('signupError').textContent = '';
      document.getElementById('signupSuccess').textContent = '';
    }

    function showSignupError(message) {
      const errorDiv = document.getElementById('signupError');
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
    }

    // Close verification modal
    document.getElementById('closeVerificationBtn').addEventListener('click', () => {
      document.getElementById('verificationModal').classList.add('hidden');
    });

    // Check verification and redirect to dashboard
    document.getElementById('checkVerificationBtn').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        await user.reload(); // Refresh user data
        if (user.emailVerified) {
          window.location.href = 'user-dashboard.html';
        } else {
          alert('Please verify your email first.');
        }
      }
    });
  </script>
</body>
</html>
